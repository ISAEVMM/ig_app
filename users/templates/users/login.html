{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card bg-dark border-0 shadow" style="border-radius: 16px;">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4 text-light">Вход в аккаунт</h3>

                    {% crispy form %}

                    <div class="text-center mt-4">
                        <small class="text-muted">
                            Нет аккаунта?
                            <a href="{% url 'register' %}" class="text-accent">Зарегистрироваться</a>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
